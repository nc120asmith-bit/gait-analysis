<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gait Analysis Pro for PhD</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; background: #000; color: white; overflow: hidden; position: fixed; width: 100%; }
    #ui-panel { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; width: calc(100% - 40px); }
    input { padding: 8px; width: 80px; font-size: 16px; border-radius: 4px; border: none; }
    button { padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; margin-left: 5px; }
    .start { background: #27ae60; color: white; }
    .stop { background: #c0392b; color: white; }
    canvas { width: 100vw; height: 100vh; object-fit: contain; }
    video { display: none; }
    #status { font-size: 12px; margin-top: 5px; color: #aaa; }
  </style>
</head>
<body>
  <div id="ui-panel">
    ID: <input type="text" id="subjectId" value="A001">
    <button id="recordBtn" class="start">計測開始</button>
    <div id="status">待機中（背面カメラ起動）</div>
  </div>
  <video id="input_video"></video>
  <canvas id="output_canvas"></canvas>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const recordBtn = document.getElementById('recordBtn');
    const statusTxt = document.getElementById('status');
    const subjectIdInput = document.getElementById('subjectId');

    let isRecording = false;
    let recordedData = [];

    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      if (results.poseLandmarks) {
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', radius: 1});
        if (isRecording) {
          recordedData.push({ t: Date.now(), lm: results.poseLandmarks });
        }
      }
      canvasCtx.restore();
    }

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await pose.send({image: videoElement}); },
       facingMode: 'environment'
    });
    camera.start();

    recordBtn.addEventListener('click', () => {
      if (!isRecording) {
        isRecording = true;
        recordedData = [];
        recordBtn.textContent = "停止・保存";
        recordBtn.className = "stop";
        statusTxt.textContent = "記録中... 利用者様が歩き終わるまで待機";
      } else {
        isRecording = false;
        recordBtn.textContent = "計測開始";
        recordBtn.className = "start";
        statusTxt.textContent = "保存完了！";
        downloadCSV();
      }
    });

    function downloadCSV() {
      const id = subjectIdInput.value || "unknown";
      const now = new Date();
      const timeStr = now.getFullYear() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0') + "_" + now.getHours().toString().padStart(2,'0') + now.getMinutes().toString().padStart(2,'0');
      
      let csv = "Time,Index,X,Y,Z,V\n";
      recordedData.forEach(f => {
        f.lm.forEach((l, i) => {
          csv += `${f.t},${i},${l.x.toFixed(4)},${l.y.toFixed(4)},${l.z.toFixed(4)},${l.visibility.toFixed(4)}\n`;
        });
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.setAttribute('href', url);
      a.setAttribute('download', `${id}_${timeStr}.csv`);
      a.click();
    }
  </script>
</body>
</html>
