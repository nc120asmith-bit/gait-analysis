<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gait Analysis for PhD</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; background: #111; color: white; text-align: center; }
    #controls { padding: 10px; background: #333; position: fixed; top: 0; width: 100%; z-index: 10; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; }
    .start { background: #2ecc71; color: white; }
    .stop { background: #e74c3c; color: white; }
    canvas { width: 100vw; height: 100vh; object-fit: contain; }
    video { display: none; }
  </style>
</head>
<body>
  <div id="controls">
    <button id="recordBtn" class="start">計測開始 (Recording)</button>
    <p id="status">ステータス: 待機中</p>
  </div>
  <video id="input_video"></video>
  <canvas id="output_canvas"></canvas>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const recordBtn = document.getElementById('recordBtn');
    const statusTxt = document.getElementById('status');

    let isRecording = false;
    let recordedData = [];

    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (results.poseLandmarks) {
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});

        // 計測中の場合、データを保存
        if (isRecording) {
          const timestamp = Date.now();
          recordedData.push({
            time: timestamp,
            landmarks: results.poseLandmarks
          });
        }
      }
      canvasCtx.restore();
    }

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await pose.send({image: videoElement}); },
      width: 1280, height: 720
    });
    camera.start();

    // 録画ボタンの処理
    recordBtn.addEventListener('click', () => {
      if (!isRecording) {
        isRecording = true;
        recordedData = [];
        recordBtn.textContent = "計測停止・保存";
        recordBtn.className = "stop";
        statusTxt.textContent = "ステータス: 記録中...";
      } else {
        isRecording = false;
        recordBtn.textContent = "計測開始 (Recording)";
        recordBtn.className = "start";
        statusTxt.textContent = "ステータス: 保存しました。";
        downloadCSV();
      }
    });

    // データをCSVとしてダウンロード
    function downloadCSV() {
      let csvContent = "data:text/csv;charset=utf-8,Time,Landmark_Index,X,Y,Z,Visibility\n";
      recordedData.forEach(frame => {
        frame.landmarks.forEach((lm, index) => {
          csvContent += `${frame.time},${index},${lm.x},${lm.y},${lm.z},${lm.visibility}\n`;
        });
      });
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", "gait_data.csv");
      document.body.appendChild(link);
      link.click();
    }
  </script>
</body>
</html>
